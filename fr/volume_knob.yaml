blueprint:
  name: "Bouton de volume (Zigbee2MQTT) (2026.3.3)"
  description: |-
    Contrôler le volume d'un lecteur multimédia avec un bouton rotatif Zigbee2MQTT (ex. Moes, IKEA SYMFONISK). La rotation contrôle le volume avec accélération, et les clics peuvent être configurés pour couper le son, lecture/pause ou allumer/éteindre.

    Version : 2026.3.3 — [Changelog](https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/CHANGELOG.md#202633)
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/template.yaml
  input:
    z2m_device:
      name: "Appareil Zigbee2MQTT"
      description: "Le bouton rotatif Zigbee2MQTT à utiliser pour le contrôle du volume. Le blueprint s'appuie sur les événements d'action MQTT et les capteurs de vitesse exposés par l'appareil sélectionné."
      selector:
        device:
          filter:
            - integration: mqtt

    media_players:
      name: "Lecteur(s) multimédia"
      description: "Le ou les lecteurs multimédia à contrôler avec le bouton."
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player

    button_settings:
      name: "Actions des boutons"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        single_click_action:
          name: "Simple clic"
          description: "Action à effectuer lors d'un simple clic."
          default: "mute"
          selector:
            select:
              options:
                - label: "Couper/rétablir le son"
                  value: "mute"
                - label: "Allumer/éteindre"
                  value: "toggle"
                - label: "Lecture / Pause"
                  value: "play_pause"
                - label: "Aucune action"
                  value: "none"

        double_click_action:
          name: "Double clic"
          description: "Action à effectuer lors d'un double clic."
          default: "play_pause"
          selector:
            select:
              options:
                - label: "Couper/rétablir le son"
                  value: "mute"
                - label: "Allumer/éteindre"
                  value: "toggle"
                - label: "Lecture / Pause"
                  value: "play_pause"
                - label: "Aucune action"
                  value: "none"

        long_press_action:
          name: "Appui long"
          description: "Action à effectuer lors d'un appui long."
          default: "toggle"
          selector:
            select:
              options:
                - label: "Couper/rétablir le son"
                  value: "mute"
                - label: "Allumer/éteindre"
                  value: "toggle"
                - label: "Lecture / Pause"
                  value: "play_pause"
                - label: "Aucune action"
                  value: "none"

mode: restart

variables:
  z2m_device_id: !input z2m_device
  media_player_ids: !input media_players
  single_action: !input single_click_action
  double_action: !input double_click_action
  long_action: !input long_press_action
  z2m_step_size_entity: >
    {{ device_entities(z2m_device_id)
       | select('match', 'sensor\\..*_action_step_size$')
       | list
       | first
       | default('') }}
  z2m_action_rate_entity: >
    {{ device_entities(z2m_device_id)
       | select('match', 'sensor\\..*_action_rate$')
       | list
       | first
       | default('') }}
  volume_players: >
    {% set ns = namespace(primary=[], receivers=[], all=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% set feat = p.attributes.supported_features | default(0) %}
      {% if feat | bitwise_and(1028) %}
        {% set ns.all = ns.all + [p.entity_id] %}
        {% if feat | bitwise_and(2048) %}
          {% set ns.receivers = ns.receivers + [p.entity_id] %}
          {% if feat | bitwise_and(384) %}
            {% set ns.primary = ns.primary + [p.entity_id] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.primary if ns.primary
       else (ns.receivers if ns.receivers else ns.all) }}
  mute_players: >
    {% set ns = namespace(primary=[], receivers=[], all=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% set feat = p.attributes.supported_features | default(0) %}
      {% if feat | bitwise_and(8) %}
        {% set ns.all = ns.all + [p.entity_id] %}
        {% if feat | bitwise_and(2048) %}
          {% set ns.receivers = ns.receivers + [p.entity_id] %}
          {% if feat | bitwise_and(384) %}
            {% set ns.primary = ns.primary + [p.entity_id] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.primary if ns.primary
       else (ns.receivers if ns.receivers else ns.all) }}
  toggle_players: >
    {% set ns = namespace(result=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['unknown', 'unavailable']) %}
      {% if (p.attributes.supported_features | default(0)) | bitwise_and(384) %}
        {% set ns.result = ns.result + [p.entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}
  play_pause_players: >
    {% set ns = namespace(result=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% if (p.attributes.supported_features | default(0)) | bitwise_and(1) %}
        {% set ns.result = ns.result + [p.entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

trigger:
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: brightness_step_up
    id: brightness_step_up
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: brightness_step_down
    id: brightness_step_down
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: toggle
    id: toggle
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: double
    id: double
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: hue_move
    id: hue_move

action:
  - choose:
      # ── Rotation: volume up / down with acceleration ──
      # ── Rotation: volume up with acceleration ──
      - conditions:
          - condition: trigger
            id: brightness_step_up
          - condition: template
            alias: "Au moins un lecteur multimédia prend en charge le volume"
            value_template: "{{ volume_players | count > 0 }}"
        sequence:
          - variables:
              step_size: "{{ states(z2m_step_size_entity) | int(0) }}"
              action_rate: "{{ states(z2m_action_rate_entity) | int(0) }}"
              score: "{{ step_size + (action_rate * 6) }}"
          - choose:
              - conditions:
                  - "{{ score | int <= 35 }}"
                sequence:
                  - repeat:
                      for_each: "{{ volume_players }}"
                      sequence:
                        - action: media_player.volume_up
                          target:
                            entity_id: "{{ repeat.item }}"
            default:
              - variables:
                  volume_delta: >
                    {% if score | int <= 60 %}
                      0.02
                    {% elif score | int <= 85 %}
                      0.04
                    {% elif score | int <= 110 %}
                      0.06
                    {% elif score | int <= 140 %}
                      0.10
                    {% else %}
                      0.12
                    {% endif %}
              - repeat:
                  for_each: "{{ volume_players }}"
                  sequence:
                    - action: media_player.volume_set
                      target:
                        entity_id: "{{ repeat.item }}"
                      data:
                        volume_level: >
                          {{ [state_attr(repeat.item, 'volume_level') | float(0) + volume_delta | float, 1.0] | min }}

      # ── Rotation: volume down with acceleration ──
      - conditions:
          - condition: trigger
            id: brightness_step_down
          - condition: template
            alias: "Au moins un lecteur multimédia prend en charge le volume"
            value_template: "{{ volume_players | count > 0 }}"
        sequence:
          - variables:
              step_size: "{{ states(z2m_step_size_entity) | int(0) }}"
              action_rate: "{{ states(z2m_action_rate_entity) | int(0) }}"
              score: "{{ step_size + (action_rate * 6) }}"
          - choose:
              - conditions:
                  - "{{ score | int <= 35 }}"
                sequence:
                  - repeat:
                      for_each: "{{ volume_players }}"
                      sequence:
                        - action: media_player.volume_down
                          target:
                            entity_id: "{{ repeat.item }}"
            default:
              - variables:
                  volume_delta: >
                    {% if score | int <= 60 %}
                      0.02
                    {% elif score | int <= 85 %}
                      0.04
                    {% elif score | int <= 110 %}
                      0.06
                    {% elif score | int <= 140 %}
                      0.10
                    {% else %}
                      0.12
                    {% endif %}
              - repeat:
                  for_each: "{{ volume_players }}"
                  sequence:
                    - action: media_player.volume_set
                      target:
                        entity_id: "{{ repeat.item }}"
                      data:
                        volume_level: >
                          {{ [state_attr(repeat.item, 'volume_level') | float(0) - volume_delta | float, 0.0] | max }}
      - conditions:
          - condition: trigger
            id: toggle
        sequence:
          - choose:
              - conditions:
                  - "{{ single_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge la sourdine"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - "{{ single_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge allumer/éteindre"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - "{{ single_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge lecture/pause"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
      - conditions:
          - condition: trigger
            id: double
        sequence:
          - choose:
              - conditions:
                  - "{{ double_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge la sourdine"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - "{{ double_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge allumer/éteindre"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - "{{ double_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge lecture/pause"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
      - conditions:
          - condition: trigger
            id: hue_move
        sequence:
          - condition: template
            alias: "Anti-rebond : ignorer le doublon d'appui long"
            value_template: >
              {{ expand(media_player_ids)
                 | selectattr('last_changed', 'ge', now() - timedelta(seconds=2))
                 | list | count == 0 }}
          - choose:
              - conditions:
                  - "{{ long_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge la sourdine"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - "{{ long_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge allumer/éteindre"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - "{{ long_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "Au moins un lecteur multimédia prend en charge lecture/pause"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
