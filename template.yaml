blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/template.yaml
  input:
    z2m_device:
      name: "[[input.z2m_device.name]]"
      description: "[[input.z2m_device.description]]"
      selector:
        device:
          filter:
            - integration: mqtt

    z2m_topic:
      name: "[[input.z2m_topic.name]]"
      description: "[[input.z2m_topic.description]]"
      default: ""
      selector:
        text:

    media_players:
      name: "[[input.media_players.name]]"
      description: "[[input.media_players.description]]"
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player

    button_settings:
      name: "[[input.button_settings.name]]"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        single_click_action:
          name: "[[input.single_click_action.name]]"
          description: "[[input.single_click_action.description]]"
          default: "mute"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        double_click_action:
          name: "[[input.double_click_action.name]]"
          description: "[[input.double_click_action.description]]"
          default: "play_pause"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        long_press_action:
          name: "[[input.long_press_action.name]]"
          description: "[[input.long_press_action.description]]"
          default: "toggle"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

mode: queued
max: 20

trigger_variables:
  z2m_device_id: !input z2m_device
  z2m_topic_override: !input z2m_topic
  z2m_mqtt_topic: >
    {% set override = z2m_topic_override | trim %}
    {% if override != '' %}
      {{ override }}
    {% else %}
      {{ 'zigbee2mqtt/' ~ device_attr(z2m_device_id, 'name') }}
    {% endif %}

variables:
  media_player_ids: !input media_players
  single_action: !input single_click_action
  double_action: !input double_click_action
  long_action: !input long_press_action
  available_players: >
    {{ expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable'])
       | map(attribute='entity_id')
       | list }}

trigger:
  - trigger: mqtt
    id: state
    topic: "{{ z2m_mqtt_topic }}"
  - trigger: mqtt
    id: action
    topic: "{{ z2m_mqtt_topic }}/action"

action:
  - choose:
      # ── Rotation: volume up / down with acceleration ──
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'state' }}"
          - condition: template
            value_template: "{{ trigger.payload_json.action == 'brightness_step_up' }}"
          - condition: template
            alias: "[[condition.players_available.alias]]"
            value_template: "{{ available_players | count > 0 }}"
        sequence:
          - variables:
              direction: "up"
              step_size: "{{ trigger.payload_json.action_step_size | default(0) | int(0) }}"
              action_rate: "{{ trigger.payload_json.action_rate | default(0) | int(0) }}"
              repeat_count: >
                {% set score = step_size + (action_rate * 6) %}
                {% if score <= 35 %}
                  1
                {% elif score <= 60 %}
                  2
                {% elif score <= 85 %}
                  4
                {% elif score <= 110 %}
                  6
                {% elif score <= 140 %}
                  10
                {% else %}
                  12
                {% endif %}
          - repeat:
              count: "{{ repeat_count | int }}"
              sequence:
                - action: "media_player.volume_{{ direction }}"
                  target:
                    entity_id: "{{ available_players }}"

      # ── Button events (single / double / long press) ──
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'state' }}"
          - condition: template
            value_template: "{{ trigger.payload_json.action == 'brightness_step_down' }}"
          - condition: template
            alias: "[[condition.players_available.alias]]"
            value_template: "{{ available_players | count > 0 }}"
        sequence:
          - variables:
              direction: "down"
              step_size: "{{ trigger.payload_json.action_step_size | default(0) | int(0) }}"
              action_rate: "{{ trigger.payload_json.action_rate | default(0) | int(0) }}"
              repeat_count: >
                {% set score = step_size + (action_rate * 6) %}
                {% if score <= 35 %}
                  1
                {% elif score <= 60 %}
                  2
                {% elif score <= 85 %}
                  4
                {% elif score <= 110 %}
                  6
                {% elif score <= 140 %}
                  10
                {% else %}
                  12
                {% endif %}
          - repeat:
              count: "{{ repeat_count | int }}"
              sequence:
                - action: "media_player.volume_{{ direction }}"
                  target:
                    entity_id: "{{ available_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'action' }}"
          - condition: template
            value_template: "{{ trigger.payload == 'toggle' }}"
        sequence:
          - condition: template
            value_template: "{{ single_action != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - repeat:
                      for_each: "{{ available_players }}"
                      sequence:
                        - action: media_player.volume_mute
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            is_volume_muted: >
                              {{ not state_attr(repeat.item, 'is_volume_muted') | default(false) }}
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'toggle' }}"
                sequence:
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ media_player_ids }}"
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - action: media_player.media_play_pause
                    target:
                      entity_id: "{{ available_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'action' }}"
          - condition: template
            value_template: "{{ trigger.payload == 'double' }}"
        sequence:
          - condition: template
            value_template: "{{ double_action != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - repeat:
                      for_each: "{{ available_players }}"
                      sequence:
                        - action: media_player.volume_mute
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            is_volume_muted: >
                              {{ not state_attr(repeat.item, 'is_volume_muted') | default(false) }}
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'toggle' }}"
                sequence:
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ media_player_ids }}"
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - action: media_player.media_play_pause
                    target:
                      entity_id: "{{ available_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'action' }}"
          - condition: template
            value_template: "{{ trigger.payload == 'hue_move' }}"
        sequence:
          - condition: template
            value_template: "{{ long_action != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - repeat:
                      for_each: "{{ available_players }}"
                      sequence:
                        - action: media_player.volume_mute
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            is_volume_muted: >
                              {{ not state_attr(repeat.item, 'is_volume_muted') | default(false) }}
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'toggle' }}"
                sequence:
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ media_player_ids }}"
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - action: media_player.media_play_pause
                    target:
                      entity_id: "{{ available_players }}"
