blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/template.yaml
  input:
    z2m_device:
      name: "[[input.z2m_device.name]]"
      description: "[[input.z2m_device.description]]"
      selector:
        device:
          filter:
            - integration: mqtt

    media_players:
      name: "[[input.media_players.name]]"
      description: "[[input.media_players.description]]"
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player

    button_settings:
      name: "[[input.button_settings.name]]"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        single_click_action:
          name: "[[input.single_click_action.name]]"
          description: "[[input.single_click_action.description]]"
          default: "mute"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        double_click_action:
          name: "[[input.double_click_action.name]]"
          description: "[[input.double_click_action.description]]"
          default: "play_pause"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        long_press_action:
          name: "[[input.long_press_action.name]]"
          description: "[[input.long_press_action.description]]"
          default: "toggle"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

mode: queued
max: 20

variables:
  media_player_ids: !input media_players
  single_action: !input single_click_action
  double_action: !input double_click_action
  long_action: !input long_press_action
  z2m_device_id: !input z2m_device
  available_players: >
    {{ expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable'])
       | map(attribute='entity_id')
       | list }}
  step_size_entity: >
    {{ device_entities(z2m_device_id)
       | select('search', 'action_step_size')
       | first | default('') }}
  action_rate_entity: >
    {{ device_entities(z2m_device_id)
       | select('search', 'action_rate$')
       | first | default('') }}

trigger:
  - trigger: device
    device_id: !input z2m_device
    domain: mqtt
    type: action
    subtype: brightness_step_up
    id: step_up

  - trigger: device
    device_id: !input z2m_device
    domain: mqtt
    type: action
    subtype: brightness_step_down
    id: step_down

  - trigger: device
    device_id: !input z2m_device
    domain: mqtt
    type: action
    subtype: toggle
    id: single_click

  - trigger: device
    device_id: !input z2m_device
    domain: mqtt
    type: action
    subtype: double
    id: double_click

  - trigger: device
    device_id: !input z2m_device
    domain: mqtt
    type: action
    subtype: hue_move
    id: long_press

action:
  - choose:
      # ── Rotation: volume up / down with acceleration ──
      - conditions:
          - condition: trigger
            id:
              - step_up
              - step_down
          - condition: template
            alias: "[[condition.players_available.alias]]"
            value_template: "{{ available_players | count > 0 }}"
        sequence:
          - variables:
              direction: >
                {{ 'up' if trigger.id == 'step_up' else 'down' }}
              step_size: >
                {{ states(step_size_entity) | int(0) }}
              action_rate: >
                {{ states(action_rate_entity) | int(0) }}
              repeat_count: >
                {% set score = step_size + (action_rate * 6) %}
                {% if score <= 35 %}
                  1
                {% elif score <= 60 %}
                  2
                {% elif score <= 85 %}
                  4
                {% elif score <= 110 %}
                  6
                {% elif score <= 140 %}
                  10
                {% else %}
                  12
                {% endif %}
          - repeat:
              count: "{{ repeat_count | int }}"
              sequence:
                - action: "media_player.volume_{{ direction }}"
                  target:
                    entity_id: "{{ available_players }}"

      # ── Button events (single / double / long press) ──
      - conditions:
          - condition: trigger
            id:
              - single_click
              - double_click
              - long_press
        sequence:
          - variables:
              resolved_action: >
                {% if trigger.id == 'single_click' %}
                  {{ single_action }}
                {% elif trigger.id == 'double_click' %}
                  {{ double_action }}
                {% elif trigger.id == 'long_press' %}
                  {{ long_action }}
                {% else %}
                  none
                {% endif %}
          - condition: template
            value_template: "{{ resolved_action | trim != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ resolved_action | trim == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - repeat:
                      for_each: "{{ available_players }}"
                      sequence:
                        - action: media_player.volume_mute
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            is_volume_muted: >
                              {{ not state_attr(repeat.item, 'is_volume_muted') | default(false) }}
              - conditions:
                  - condition: template
                    value_template: "{{ resolved_action | trim == 'toggle' }}"
                sequence:
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ media_player_ids }}"
              - conditions:
                  - condition: template
                    value_template: "{{ resolved_action | trim == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.players_available.alias]]"
                    value_template: "{{ available_players | count > 0 }}"
                  - action: media_player.media_play_pause
                    target:
                      entity_id: "{{ available_players }}"
