blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/volume-knob-blueprint/blob/main/template.yaml
  input:
    z2m_device:
      name: "[[input.z2m_device.name]]"
      description: "[[input.z2m_device.description]]"
      selector:
        device:
          filter:
            - integration: mqtt

    media_players:
      name: "[[input.media_players.name]]"
      description: "[[input.media_players.description]]"
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player

    button_settings:
      name: "[[input.button_settings.name]]"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        single_click_action:
          name: "[[input.single_click_action.name]]"
          description: "[[input.single_click_action.description]]"
          default: "mute"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        double_click_action:
          name: "[[input.double_click_action.name]]"
          description: "[[input.double_click_action.description]]"
          default: "play_pause"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

        long_press_action:
          name: "[[input.long_press_action.name]]"
          description: "[[input.long_press_action.description]]"
          default: "toggle"
          selector:
            select:
              options:
                - label: "[[option.mute]]"
                  value: "mute"
                - label: "[[option.toggle]]"
                  value: "toggle"
                - label: "[[option.play_pause]]"
                  value: "play_pause"
                - label: "[[option.none]]"
                  value: "none"

mode: queued
max: 20

variables:
  z2m_device_id: !input z2m_device
  media_player_ids: !input media_players
  single_action: !input single_click_action
  double_action: !input double_click_action
  long_action: !input long_press_action
  z2m_step_size_entity: >
    {{ device_entities(z2m_device_id)
       | select('match', 'sensor\\..*_action_step_size$')
       | list
       | first
       | default('') }}
  z2m_action_rate_entity: >
    {{ device_entities(z2m_device_id)
       | select('match', 'sensor\\..*_action_rate$')
       | list
       | first
       | default('') }}
  volume_players: >
    {% set ns = namespace(primary=[], receivers=[], all=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% set feat = p.attributes.supported_features | default(0) %}
      {% if feat | bitwise_and(1028) %}
        {% set ns.all = ns.all + [p.entity_id] %}
        {% if feat | bitwise_and(2048) %}
          {% set ns.receivers = ns.receivers + [p.entity_id] %}
          {% if feat | bitwise_and(384) %}
            {% set ns.primary = ns.primary + [p.entity_id] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.primary if ns.primary
       else (ns.receivers if ns.receivers else ns.all) }}
  mute_players: >
    {% set ns = namespace(primary=[], receivers=[], all=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% set feat = p.attributes.supported_features | default(0) %}
      {% if feat | bitwise_and(8) %}
        {% set ns.all = ns.all + [p.entity_id] %}
        {% if feat | bitwise_and(2048) %}
          {% set ns.receivers = ns.receivers + [p.entity_id] %}
          {% if feat | bitwise_and(384) %}
            {% set ns.primary = ns.primary + [p.entity_id] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.primary if ns.primary
       else (ns.receivers if ns.receivers else ns.all) }}
  toggle_players: >
    {% set ns = namespace(result=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['unknown', 'unavailable']) %}
      {% if (p.attributes.supported_features | default(0)) | bitwise_and(384) %}
        {% set ns.result = ns.result + [p.entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}
  play_pause_players: >
    {% set ns = namespace(result=[]) %}
    {% for p in expand(media_player_ids)
       | rejectattr('state', 'in', ['off', 'unknown', 'unavailable']) %}
      {% if (p.attributes.supported_features | default(0)) | bitwise_and(1) %}
        {% set ns.result = ns.result + [p.entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

trigger:
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: brightness_step_up
    id: brightness_step_up
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: brightness_step_down
    id: brightness_step_down
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: toggle
    id: toggle
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: double
    id: double
  - trigger: device
    domain: mqtt
    device_id: !input z2m_device
    type: action
    subtype: hue_move
    id: hue_move

action:
  - choose:
      # ── Rotation: volume up / down with acceleration ──
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'brightness_step_up' }}"
          - condition: template
            alias: "[[condition.volume_players_available.alias]]"
            value_template: "{{ volume_players | count > 0 }}"
        sequence:
          - variables:
              direction: "up"
              step_size: "{{ states(z2m_step_size_entity) | int(0) }}"
              action_rate: "{{ states(z2m_action_rate_entity) | int(0) }}"
              repeat_count: >
                {% set score = step_size + (action_rate * 6) %}
                {% if score <= 35 %}
                  1
                {% elif score <= 60 %}
                  2
                {% elif score <= 85 %}
                  4
                {% elif score <= 110 %}
                  6
                {% elif score <= 140 %}
                  10
                {% else %}
                  12
                {% endif %}
          - repeat:
              count: "{{ repeat_count | int }}"
              sequence:
                - action: "media_player.volume_{{ direction }}"
                  target:
                    entity_id: "{{ volume_players }}"

      # ── Button events (single / double / long press) ──
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'brightness_step_down' }}"
          - condition: template
            alias: "[[condition.volume_players_available.alias]]"
            value_template: "{{ volume_players | count > 0 }}"
        sequence:
          - variables:
              direction: "down"
              step_size: "{{ states(z2m_step_size_entity) | int(0) }}"
              action_rate: "{{ states(z2m_action_rate_entity) | int(0) }}"
              repeat_count: >
                {% set score = step_size + (action_rate * 6) %}
                {% if score <= 35 %}
                  1
                {% elif score <= 60 %}
                  2
                {% elif score <= 85 %}
                  4
                {% elif score <= 110 %}
                  6
                {% elif score <= 140 %}
                  10
                {% else %}
                  12
                {% endif %}
          - repeat:
              count: "{{ repeat_count | int }}"
              sequence:
                - action: "media_player.volume_{{ direction }}"
                  target:
                    entity_id: "{{ volume_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'toggle' }}"
        sequence:
          - condition: template
            value_template: "{{ single_action != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.mute_players_available.alias]]"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.toggle_players_available.alias]]"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - condition: template
                    value_template: "{{ single_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.play_pause_players_available.alias]]"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'double' }}"
        sequence:
          - condition: template
            value_template: "{{ double_action != 'none' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.mute_players_available.alias]]"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.toggle_players_available.alias]]"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - condition: template
                    value_template: "{{ double_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.play_pause_players_available.alias]]"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'hue_move' }}"
        sequence:
          - condition: template
            value_template: "{{ long_action != 'none' }}"
          - condition: template
            alias: "[[condition.long_press_debounce.alias]]"
            value_template: >
              {{ expand(media_player_ids)
                 | selectattr('last_changed', 'ge', now() - timedelta(seconds=2))
                 | list | count == 0 }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'mute' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.mute_players_available.alias]]"
                    value_template: "{{ mute_players | count > 0 }}"
                  - action: media_player.volume_mute
                    target:
                      entity_id: "{{ mute_players }}"
                    data:
                      is_volume_muted: >
                        {{ expand(mute_players)
                           | rejectattr('attributes.is_volume_muted', 'eq', true)
                           | list | count > 0 }}
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'toggle' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.toggle_players_available.alias]]"
                    value_template: "{{ toggle_players | count > 0 }}"
                  - action: media_player.toggle
                    target:
                      entity_id: "{{ toggle_players }}"
              - conditions:
                  - condition: template
                    value_template: "{{ long_action == 'play_pause' }}"
                sequence:
                  - condition: template
                    alias: "[[condition.play_pause_players_available.alias]]"
                    value_template: "{{ play_pause_players | count > 0 }}"
                  - action: >
                      {{ 'media_player.media_pause'
                         if expand(play_pause_players)
                            | selectattr('state', 'eq', 'playing')
                            | list | count > 0
                         else 'media_player.media_play' }}
                    target:
                      entity_id: "{{ play_pause_players }}"
